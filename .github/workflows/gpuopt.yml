name: gpuopt — CUDA Kernel Analysis

on:
  pull_request:
    paths:
      - '**.cu'

permissions:
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential verilator iverilog

      - name: Build gpuopt
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target gpuopt

      - name: Find changed .cu files
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const cuFiles = files.data
              .map(f => f.filename)
              .filter(f => f.endsWith('.cu'))
              .join(' ');
            core.setOutput('files', cuFiles);

      - name: Run gpuopt on changed kernels
        id: analysis
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          REPORT=""
          for f in $FILES; do
            if [ -f "$f" ]; then
              RESULT=$(./build/tools/gpuopt --kernel "$f" --n 64 2>&1)
              REPORT="${REPORT}

### \`${f}\`
\`\`\`
${RESULT}
\`\`\`"
            fi
          done
          {
            echo "report<<ENDOFOUTPUT"
            echo "$REPORT"
            echo "ENDOFOUTPUT"
          } >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: steps.analysis.outputs.report != ''
        uses: actions/github-script@v7
        with:
          script: |
            const report = process.env.GPUOPT_REPORT;
            if (!report || !report.trim()) {
              console.log('No .cu files changed or no report generated.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔍 gpuopt — CUDA Kernel Analysis\n\n${report}\n\n---\n*Powered by [gpuopt](https://github.com/tejakusireddy/opengpu-lab)*`
            });
        env:
          GPUOPT_REPORT: ${{ steps.analysis.outputs.report }}
